<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annamay Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;font-family:'DM Sans',sans-serif;background:#f5f3ee;color:#1a1916}.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.box{width:100%;max-width:380px;background:#fff;border:1px solid #e0dcd5;border-radius:18px;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.08)}h1{margin:0 0 8px;font-size:24px}.muted{color:#7a7570;font-size:14px}.field{display:grid;gap:6px;margin:14px 0}.field label{font-size:12px;font-weight:800;color:#7a7570;text-transform:uppercase}.field input,.field textarea,.field select{width:100%;border:1px solid #d8d1c8;border-radius:10px;padding:12px;font:inherit}.btn{border:0;border-radius:10px;background:#1f7a63;color:#fff;font-weight:800;padding:12px 14px;cursor:pointer}.btn.ghost{background:#fff;color:#1f7a63;border:1px solid #1f7a63}.btn.warn{background:#b91c1c}.app{display:none}.top{position:sticky;top:0;background:#fff;border-bottom:1px solid #e0dcd5;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid #d8d1c8;background:#fff;border-radius:999px;padding:9px 13px;font-weight:800;cursor:pointer}.tab.on{background:#1f7a63;color:#fff;border-color:#1f7a63}.wrap{max-width:1240px;margin:0 auto;padding:20px}.panel{display:none}.panel.on{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.card{background:#fff;border:1px solid #e0dcd5;border-radius:14px;padding:16px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.pill{border-radius:999px;background:#edf8f4;color:#165a48;padding:4px 9px;font-size:11px;font-weight:800;text-transform:capitalize}.items{font-size:13px;color:#7a7570;line-height:1.6;margin:10px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mini-input{width:96px;border:1px solid #d8d1c8;border-radius:10px;padding:10px;font:inherit}.order-meta{display:grid;gap:6px;margin:10px 0;color:#7a7570;font-size:13px;line-height:1.45}.menu-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}.menu-form input,.menu-form select{border:1px solid #d8d1c8;border-radius:10px;padding:12px;font:inherit}.category-group{margin:22px 0}.category-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 10px}.category-head h3{margin:0;font-size:18px}.category-head span{font-size:12px;font-weight:800;color:#7a7570}.category-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.switch{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:#7a7570}.switch input{display:none}.slider{width:42px;height:24px;border-radius:999px;background:#d8d1c8;position:relative;transition:.2s}.slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.18)}.switch input:checked+.slider{background:#1f7a63}.switch input:checked+.slider:before{transform:translateX(18px)}.danger{color:#b91c1c}.metric{font-size:28px;font-weight:800;color:#1f7a63}
</style>
<style>
.status-card{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:14px 0;padding:14px;border:1px solid #e0dcd5;border-radius:14px;background:#f9f7f2}
.status-badge{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}
.status-badge.open{background:#edf8f4;color:#165a48}
.status-badge.closed{background:#fff1f1;color:#991b1b}
.status-dot{width:10px;height:10px;border-radius:50%;background:currentColor}
</style>
</head>
<body>
<section class="gate" id="gate">
  <div class="box">
    <h1>Admin Login</h1>
    <p class="muted">Use the staff email approved for this Firebase project.</p>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email"></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" onclick="login()">Sign In</button>
    <button class="btn ghost" id="demoBtn" style="width:100%;margin-top:10px;display:none" onclick="startDemoAdmin()">Preview Demo Dashboard</button>
    <p class="muted danger" id="loginError"></p>
  </div>
</section>

<section class="app" id="app">
  <header class="top">
    <div>
      <strong>Annamay Admin</strong>
      <div class="muted" id="adminEmail"></div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="showTab('orders', this)">Orders</button>
      <button class="tab" onclick="showTab('menu', this)">Menu</button>
      <button class="tab" onclick="showTab('settings', this)">Settings</button>
      <button class="tab" onclick="showTab('analytics', this)">Analytics</button>
      <button class="tab" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel on" id="orders"><div class="grid" id="ordersGrid"></div></section>
    <section class="panel" id="menu">
      <div class="card">
        <h2>Add / Edit Item</h2>
        <div class="menu-form">
          <input id="itemId" type="hidden">
          <input id="itemName" placeholder="Name">
          <select id="itemCategorySelect"></select>
          <input id="itemCategoryNew" placeholder="New category name">
          <input id="itemPrice" type="number" placeholder="Price">
          <input id="itemImage" placeholder="Image URL">
          <select id="itemAvailable"><option value="true">Available</option><option value="false">Unavailable</option></select>
        </div>
        <button class="btn" onclick="saveMenuItem()">Save Item</button>
      </div>
      <h2>Menu Items</h2>
      <div class="grid" id="menuGrid"></div>
    </section>
    <section class="panel" id="settings">
      <div class="card">
        <h2>Restaurant Status</h2>
        <p class="muted">This controls whether customers can proceed to checkout.</p>
        <div class="status-card">
          <div>
            <strong>Website Ordering</strong>
            <div class="muted" id="restaurantStatusHelp">Checking current order status...</div>
          </div>
          <div class="status-badge closed" id="restaurantStatusBadge"><span class="status-dot"></span><span id="restaurantStatusText">Unknown</span></div>
        </div>
        <div class="actions">
          <button class="btn" onclick="setAvailability(true)">Accept Orders</button>
          <button class="btn warn" onclick="setAvailability(false)">Pause Orders</button>
        </div>
      </div>
    </section>
    <section class="panel" id="analytics">
      <div class="grid">
        <div class="card"><div class="muted">Today Orders</div><div class="metric" id="metricOrders">0</div></div>
        <div class="card"><div class="muted">Today Sales</div><div class="metric" id="metricSales">&#8377;0</div></div>
      </div>
    </section>
  </main>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script>
const firebaseConfig = window.FIREBASE_CONFIG || {};
const configReady = firebaseConfig.apiKey && !String(firebaseConfig.apiKey).startsWith('REPLACE_');
const demoAllowed = !configReady || ['localhost', '127.0.0.1'].includes(location.hostname);
let auth = null;
let db = null;
let updateOrderStatus = null;
let setRestaurantAvailability = null;
let demoMode = false;
let demoOrders = [];
let demoMenuItems = [];
let demoOpen = true;
let settingsUnsubscribe = null;

if (configReady) {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  const functions = firebase.functions();
  updateOrderStatus = functions.httpsCallable('updateOrderStatus');
  setRestaurantAvailability = functions.httpsCallable('setRestaurantAvailability');
} else if (demoAllowed) {
  demoBtn.style.display = 'block';
  loginError.textContent = 'Firebase is not configured yet. Use demo preview to inspect the dashboard.';
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function slug(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '');
}

function getCategoryName() {
  return itemCategoryNew.value.trim() || itemCategorySelect.value.trim();
}

function populateCategorySelect(items, selected = '') {
  const defaults = ['South Indian', 'Burger', 'Sandwiches', 'Indian Main Course', 'Tandoori Breads', 'Dal', 'Rice & Biryani', 'Chinese Rice & Noodles', 'Clay Oven Starter', 'Sizzler', 'Platter', 'Continental', 'Pasta', 'Pav Bhaji', 'Dessert', 'Soup', 'Shakes', 'Mocktails', 'Hot Beverages'];
  const names = [...new Set([...defaults, ...items.map(item => item.categoryName || item.categoryId || '').filter(Boolean)])].sort((a, b) => a.localeCompare(b));
  itemCategorySelect.innerHTML = '<option value="">Choose category</option>' + names.map(name => `<option value="${esc(name)}">${esc(name)}</option>`).join('');
  if (selected && names.includes(selected)) itemCategorySelect.value = selected;
  itemCategoryNew.style.display = selected && !names.includes(selected) ? '' : '';
  if (selected && !names.includes(selected)) itemCategoryNew.value = selected;
}

function menuCard(item) {
  return `<div class="card">
    <div class="row"><strong>${esc(item.name)}</strong><span>&#8377;${item.price}</span></div>
    <div class="muted">${esc(item.categoryName || item.categoryId || '')}</div>
    <div class="actions">
      <button class="btn ghost" onclick="editItem('${item.id}')">Edit</button>
      <label class="switch"><input type="checkbox" ${item.isAvailable === false ? '' : 'checked'} onchange="toggleItem('${item.id}', this.checked)"><span class="slider"></span>${item.isAvailable === false ? 'Off' : 'On'}</label>
      <button class="btn warn" onclick="deleteItem('${item.id}')">Delete</button>
    </div>
  </div>`;
}

function renderMenuByCategory(items) {
  const grouped = {};
  items.forEach(item => {
    const category = item.categoryName || item.categoryId || 'Uncategorized';
    if (!grouped[category]) grouped[category] = [];
    grouped[category].push(item);
  });
  const categories = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
  menuGrid.innerHTML = categories.map(category => {
    const categoryItems = grouped[category].sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
    return `<section class="category-group">
      <div class="category-head"><h3>${esc(category)}</h3><span>${categoryItems.length} item${categoryItems.length === 1 ? '' : 's'}</span></div>
      <div class="category-items">${categoryItems.map(menuCard).join('')}</div>
    </section>`;
  }).join('') || '<p class="muted">No menu items yet.</p>';
}

function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('on', p.id === id));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
}

function renderRestaurantStatus(open) {
  restaurantStatusBadge.classList.toggle('open', open);
  restaurantStatusBadge.classList.toggle('closed', !open);
  restaurantStatusText.textContent = open ? 'Orders On' : 'Orders Paused';
  restaurantStatusHelp.textContent = open
    ? 'Customers can place and pay for orders right now.'
    : 'Checkout is paused for customers until orders are turned on.';
}

function listenRestaurantStatus() {
  if (!db || settingsUnsubscribe) return;
  settingsUnsubscribe = db.collection('settings').doc('restaurant').onSnapshot(snapshot => {
    const data = snapshot.exists ? snapshot.data() : {};
    renderRestaurantStatus(data.isOpen !== false && data.acceptingOrders !== false);
  }, () => renderRestaurantStatus(false));
}

async function login() {
  const error = document.getElementById('loginError');
  error.textContent = '';
  if (!configReady) {
    error.textContent = 'Firebase is not configured yet. Use demo preview for now.';
    return;
  }
  try {
    await auth.signInWithEmailAndPassword(email.value, password.value);
  } catch (err) {
    error.textContent = err.message;
  }
}

function logout() {
  if (demoMode) {
    demoMode = false;
    gate.style.display = 'flex';
    app.style.display = 'none';
    return;
  }
  auth.signOut();
}

if (configReady) {
  auth.onAuthStateChanged(async user => {
    if (!user) {
      gate.style.display = 'flex';
      app.style.display = 'none';
      return;
    }
    const token = await user.getIdTokenResult(true);
    if (token.claims.admin !== true) {
      loginError.textContent = 'This account is not an admin.';
      await auth.signOut();
      return;
    }
    gate.style.display = 'none';
    app.style.display = 'block';
    adminEmail.textContent = user.email;
    listenRestaurantStatus();
    listenOrders();
    listenMenu();
  });
}

function listenOrders() {
  db.collection('orders').orderBy('createdAt', 'desc').limit(80).onSnapshot(snap => {
    let todayCount = 0, todaySales = 0;
    const today = new Date().toISOString().slice(0, 10);
    const paidDocs = snap.docs.filter(doc => doc.data().payment?.status === 'paid');
    ordersGrid.innerHTML = paidDocs.map(doc => {
      const o = { id: doc.id, ...doc.data() };
      const created = o.createdAt?.toDate ? o.createdAt.toDate() : new Date();
      if (created.toISOString().startsWith(today) && o.payment?.status === 'paid') {
        todayCount += 1;
        todaySales += o.pricing?.total || 0;
      }
      const items = (o.items || []).map(i => `${esc(i.name)} x${i.qty}`).join('<br>');
      const mode = o.fulfillmentMode === 'pickup' ? 'pickup' : 'delivery';
      const eta = o.estimatedReadyAt?.toDate ? o.estimatedReadyAt.toDate().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) : 'Not set';
      const statusButtons = mode === 'pickup'
        ? [['accepted','accepted'],['preparing','preparing'],['ready','ready for pickup'],['delivered','picked up']]
        : [['accepted','accepted'],['preparing','preparing'],['ready','ready'],['out_for_delivery','out for delivery'],['delivered','delivered']];
      return `<div class="card">
        <div class="row"><strong>${o.orderNumber || o.id}</strong><span class="pill">${o.status}</span></div>
        <div class="order-meta">
          <div><strong>${mode === 'pickup' ? 'Pickup' : 'Delivery'}</strong> &middot; ${esc(o.customer?.name || '')} &middot; ${esc(o.customer?.phone || '')}</div>
          ${mode === 'delivery' && o.customer?.address ? `<div>${esc(o.customer.address)}</div>` : ''}
          <div>ETA: ${eta}</div>
          ${o.cancellationReason ? `<div class="danger">Cancelled: ${esc(o.cancellationReason)}</div>` : ''}
        </div>
        <div class="items">${items}</div>
        <div class="row"><strong>&#8377;${o.pricing?.total || 0}</strong><span class="pill">${o.payment?.status || 'unpaid'}</span></div>
        <div class="actions">
          <button class="btn ghost" onclick="acceptOrder('${o.id}',20)">20 min</button>
          <button class="btn ghost" onclick="acceptOrder('${o.id}',30)">30 min</button>
          <button class="btn ghost" onclick="acceptOrder('${o.id}',45)">45 min</button>
          <button class="btn ghost" onclick="acceptOrder('${o.id}',60)">60 min</button>
          <input class="mini-input" id="mins-${o.id}" type="number" min="5" max="180" placeholder="Custom">
          <button class="btn ghost" onclick="acceptCustom('${o.id}')">Accept</button>
        </div>
        <div class="actions">
          ${statusButtons.map(([s,label]) => `<button class="btn ghost" onclick="changeStatus('${o.id}','${s}')">${label}</button>`).join('')}
          <button class="btn warn" onclick="cancelOrder('${o.id}')">cancel</button>
        </div>
      </div>`;
    }).join('') || '<p class="muted">No orders yet.</p>';
    metricOrders.textContent = todayCount;
    metricSales.textContent = `₹${todaySales}`;
  });
}

function startDemoAdmin() {
  if (!demoAllowed) return;
  demoMode = true;
  const now = new Date();
  demoOrders = [
    {
      id: 'demo-delivery',
      orderNumber: 'ANN-DEMO-0001',
      status: 'pending',
      fulfillmentMode: 'delivery',
      customer: { name: 'Demo Customer', phone: '9876543210', address: 'Sector-E, Shantipuram, Phaphamau' },
      items: [{ name: 'Paneer Tikka', qty: 1 }, { name: 'Masala Dosa', qty: 2 }],
      pricing: { total: 548 },
      payment: { status: 'paid' },
      createdAt: { toDate: () => now }
    },
    {
      id: 'demo-pickup',
      orderNumber: 'ANN-DEMO-0002',
      status: 'accepted',
      fulfillmentMode: 'pickup',
      customer: { name: 'Pickup Guest', phone: '9123456780', address: '' },
      items: [{ name: 'Veg Burger', qty: 2 }, { name: 'Cold Coffee', qty: 1 }],
      pricing: { total: 327 },
      payment: { status: 'paid' },
      estimatedReadyAt: { toDate: () => new Date(Date.now() + 25 * 60000) },
      createdAt: { toDate: () => now }
    }
  ];
  demoMenuItems = [
    { id: 'paneer-tikka', name: 'Paneer Tikka', categoryName: 'Clay Oven Starter', price: 249, isAvailable: true },
    { id: 'masala-dosa', name: 'Masala Dosa', categoryName: 'South Indian', price: 149, isAvailable: true },
    { id: 'veg-burger', name: 'Veg Burger', categoryName: 'Burger', price: 119, isAvailable: false }
  ];
  gate.style.display = 'none';
  app.style.display = 'block';
  adminEmail.textContent = 'Demo preview - Firebase not connected';
  renderRestaurantStatus(demoOpen);
  renderDemoOrders();
  renderDemoMenu();
}

function renderDemoOrders() {
  let todayCount = 0, todaySales = 0;
  ordersGrid.innerHTML = demoOrders.map(o => {
    todayCount += 1;
    todaySales += o.pricing?.total || 0;
    const items = (o.items || []).map(i => `${esc(i.name)} x${i.qty}`).join('<br>');
    const mode = o.fulfillmentMode === 'pickup' ? 'pickup' : 'delivery';
    const eta = o.estimatedReadyAt?.toDate ? o.estimatedReadyAt.toDate().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) : 'Not set';
    const statusButtons = mode === 'pickup'
      ? [['accepted','accepted'],['preparing','preparing'],['ready','ready for pickup'],['delivered','picked up']]
      : [['accepted','accepted'],['preparing','preparing'],['ready','ready'],['out_for_delivery','out for delivery'],['delivered','delivered']];
    return `<div class="card">
      <div class="row"><strong>${o.orderNumber}</strong><span class="pill">${o.status}</span></div>
      <div class="order-meta">
        <div><strong>${mode === 'pickup' ? 'Pickup' : 'Delivery'}</strong> &middot; ${esc(o.customer.name)} &middot; ${esc(o.customer.phone)}</div>
        ${mode === 'delivery' ? `<div>${esc(o.customer.address)}</div>` : ''}
        <div>ETA: ${eta}</div>
        ${o.cancellationReason ? `<div class="danger">Cancelled: ${esc(o.cancellationReason)}</div>` : ''}
      </div>
      <div class="items">${items}</div>
      <div class="row"><strong>&#8377;${o.pricing?.total || 0}</strong><span class="pill">paid</span></div>
      <div class="actions">
        <button class="btn ghost" onclick="acceptOrder('${o.id}',20)">20 min</button>
        <button class="btn ghost" onclick="acceptOrder('${o.id}',30)">30 min</button>
        <button class="btn ghost" onclick="acceptOrder('${o.id}',45)">45 min</button>
        <button class="btn ghost" onclick="acceptOrder('${o.id}',60)">60 min</button>
        <input class="mini-input" id="mins-${o.id}" type="number" min="5" max="180" placeholder="Custom">
        <button class="btn ghost" onclick="acceptCustom('${o.id}')">Accept</button>
      </div>
      <div class="actions">
        ${statusButtons.map(([s,label]) => `<button class="btn ghost" onclick="changeStatus('${o.id}','${s}')">${label}</button>`).join('')}
        <button class="btn warn" onclick="cancelOrder('${o.id}')">cancel</button>
      </div>
    </div>`;
  }).join('');
  metricOrders.textContent = todayCount;
  metricSales.innerHTML = `&#8377;${todaySales}`;
}

async function changeStatus(orderId, status) {
  if (demoMode) {
    const order = demoOrders.find(o => o.id === orderId);
    if (order) {
      order.status = status;
      renderDemoOrders();
    }
    return;
  }
  const payload = { orderId, status };
  if (status === 'accepted') payload.estimatedPrepMinutes = 30;
  await updateOrderStatus(payload);
}

async function acceptOrder(orderId, minutes) {
  if (demoMode) {
    const order = demoOrders.find(o => o.id === orderId);
    if (order) {
      order.status = 'accepted';
      order.estimatedReadyAt = { toDate: () => new Date(Date.now() + Number(minutes || 30) * 60000) };
      renderDemoOrders();
    }
    return;
  }
  await updateOrderStatus({ orderId, status: 'accepted', estimatedPrepMinutes: minutes });
}

async function acceptCustom(orderId) {
  const input = document.getElementById(`mins-${orderId}`);
  const minutes = Number(input?.value || 30);
  await acceptOrder(orderId, minutes);
}

async function cancelOrder(orderId) {
  const reason = prompt('Reason for cancellation? This will be visible on the tracking page.');
  if (reason === null) return;
  if (demoMode) {
    const order = demoOrders.find(o => o.id === orderId);
    if (order) {
      order.status = 'cancelled';
      order.cancellationReason = reason;
      renderDemoOrders();
    }
    return;
  }
  await updateOrderStatus({ orderId, status: 'cancelled', cancellationReason: reason });
}

function listenMenu() {
  db.collection('menuItems').orderBy('categoryName').onSnapshot(snap => {
    const docs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    populateCategorySelect(docs, itemCategorySelect.value);
    renderMenuByCategory(docs);
  });
}

function renderDemoMenu() {
  populateCategorySelect(demoMenuItems, itemCategorySelect.value);
  renderMenuByCategory(demoMenuItems);
}

window.editItem = async id => {
  if (demoMode) {
    const item = demoMenuItems.find(i => i.id === id);
    if (!item) return;
    itemId.value = id;
    itemName.value = item.name || '';
    populateCategorySelect(demoMenuItems, item.categoryName || item.categoryId || '');
    itemCategoryNew.value = '';
    itemPrice.value = item.price || 0;
    itemImage.value = item.imageUrl || '';
    itemAvailable.value = String(item.isAvailable !== false);
    return;
  }
  const snap = await db.collection('menuItems').doc(id).get();
  const item = snap.data();
  itemId.value = id;
  itemName.value = item.name || '';
  populateCategorySelect([], item.categoryName || item.categoryId || '');
  itemCategoryNew.value = '';
  itemPrice.value = item.price || 0;
  itemImage.value = item.imageUrl || '';
  itemAvailable.value = String(item.isAvailable !== false);
};

async function saveMenuItem() {
  const name = itemName.value.trim();
  const categoryName = getCategoryName();
  const id = itemId.value.trim() || slug(name);
  if (!name || !categoryName || !Number(itemPrice.value)) {
    alert('Please enter item name, category, and price.');
    return;
  }
  if (demoMode) {
    const next = {
      id,
      name,
      categoryName,
      categoryId: slug(categoryName),
      price: Number(itemPrice.value),
      imageUrl: itemImage.value.trim(),
      isAvailable: itemAvailable.value === 'true'
    };
    const index = demoMenuItems.findIndex(item => item.id === id);
    if (index >= 0) demoMenuItems[index] = next;
    else demoMenuItems.push(next);
    itemId.value = itemName.value = itemCategoryNew.value = itemPrice.value = itemImage.value = '';
    renderDemoMenu();
    return;
  }
  await db.collection('menuItems').doc(id).set({
    name,
    categoryName,
    categoryId: slug(categoryName),
    price: Number(itemPrice.value),
    imageUrl: itemImage.value.trim(),
    isAvailable: itemAvailable.value === 'true',
    isActive: true,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
  itemId.value = itemName.value = itemCategoryNew.value = itemPrice.value = itemImage.value = '';
}

async function toggleItem(id, enable) {
  if (demoMode) {
    const item = demoMenuItems.find(i => i.id === id);
    if (item) item.isAvailable = enable;
    renderDemoMenu();
    return;
  }
  await db.collection('menuItems').doc(id).update({ isAvailable: enable, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
}

async function deleteItem(id) {
  if (demoMode) {
    if (confirm('Delete this demo menu item?')) {
      demoMenuItems = demoMenuItems.filter(item => item.id !== id);
      renderDemoMenu();
    }
    return;
  }
  if (confirm('Delete this menu item?')) await db.collection('menuItems').doc(id).delete();
}

async function setAvailability(open) {
  if (demoMode) {
    demoOpen = open;
    renderRestaurantStatus(open);
    return;
  }
  await setRestaurantAvailability({ isOpen: open, acceptingOrders: open });
}
</script>
</body>
</html>
